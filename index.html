<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AU-NZ Longsword Top 100 – Improved Regional Rating</title>

<style>
body{font-family:Arial;background:#0f1115;color:#e6e6e6;margin:20px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #2a2f3a;padding:6px;}
th{background:#1f2633;}
tr:nth-child(even){background:#121621;}

button.active {
  background: #2b6cff;
  color: white;
  border: 1px solid #2b6cff;
}

.hint{color:#aeb7c6;font-size:12px;margin-top:-8px;margin-bottom:12px;}
.positive{color:#7ee787;font-weight:600;}
.negative{color:#ff7b72;font-weight:600;}
.neutral{color:#aeb7c6;}
.help{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid #4b5565;color:#aeb7c6;font-size:11px;cursor:help;line-height:1;vertical-align:middle;}
.summary{margin:16px 0 20px;padding:14px;background:#121621;border:1px solid #2a2f3a;border-radius:6px;}
.summary h3{margin:0 0 10px;font-size:16px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 16px;margin-bottom:12px;}
.metric{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #222938;padding:4px 0;}
.metric-name{color:#aeb7c6;}
.small{font-size:12px;color:#aeb7c6;}
</style>
</head>

<body>

<div id="ratingsetButtons">
  <button data-set="1" onclick="setRatingset(1)">Longsword</button>
  <button data-set="5" onclick="setRatingset(5)">Rapier</button>
  <button data-set="4" onclick="setRatingset(4)">Rapier & Dagger</button>
  <button data-set="3" onclick="setRatingset(3)">Sabre</button>
  <button data-set="9" onclick="setRatingset(9)">Sidesword</button>
</div>

<h2>AU-NZ Longsword Top 100 – Improved Regional Rating</h2>

<div class="summary" id="summary">
  <h3>Mode summary</h3>
  <div class="summary-grid" id="summaryGrid"></div>
  <div class="small" id="summaryNote"></div>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Tier</th>
<th>Athlete</th>
<th>Club</th>
<th>Rating</th>
<th>Change</th>
<th>Skill</th>
<th>Uncertainty</th>
<th>Vs Median</th>
</tr>
</thead>

<tbody id="b"></tbody>
</table>

<script>
/* ---------------- URL STATE ---------------- */

function getRatingsetFromURL() {
  const params = new URLSearchParams(window.location.search);
  const set = parseInt(params.get("set"), 10);
  return Number.isFinite(set) ? set : 1;
}

let currentRatingset = getRatingsetFromURL();

/* ---------------- ACTIVE BUTTON UI ---------------- */

function updateActiveButtons(id) {
  document.querySelectorAll("#ratingsetButtons button").forEach(btn => {
    btn.classList.toggle("active", Number(btn.dataset.set) === id);
  });
}

/* ---------------- MAIN HANDLER ---------------- */

async function setRatingset(id) {
  currentRatingset = id;

  // update URL (no reload)
  const url = new URL(window.location);
  url.searchParams.set("set", id);
  window.history.pushState({}, "", url);

  updateActiveButtons(id);

  await app.loadPlayers();
  app.render();
}

/* ---------------- APP ---------------- */

(async () => {

  const CONFIG = {
    topN: 100,
    dataUrl: "https://icy-term-5678.nt-mcguigan.workers.dev"
  };

  const dom = {
    tbody: document.getElementById("b")
  };

  const app = {

    players: [],

    isAUorNZ(value) {
      const t = (value || "").toLowerCase();
      return t.includes("australia") || t.includes("new zealand") || t === "au" || t === "nz";
    },

    async loadPlayers() {
      try {
        const res = await fetch(
          `${CONFIG.dataUrl}?ratingsetid=${currentRatingset}`
        );

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const players = await res.json();

        this.players = players.filter(p => this.isAUorNZ(p.nationality));

        return true;

      } catch (err) {
        console.error(err);
        dom.tbody.innerHTML = "<tr><td colspan='9'>Failed to load</td></tr>";
        return false;
      }
    },

    render() {
      dom.tbody.innerHTML = "";

      this.players.slice(0, CONFIG.topN).forEach((p, i) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>-</td>
          <td>${p.athlete}</td>
          <td>${p.club}</td>
          <td>${p.rating}</td>
          <td>-</td>
          <td>${p.rating}</td>
          <td>${p.confidence}</td>
          <td>-</td>
        `;

        dom.tbody.appendChild(tr);
      });
    },

    async init() {
      updateActiveButtons(currentRatingset);
      await this.loadPlayers();
      this.render();
    }
  };

  window.app = app;
  await app.init();

})();
</script>

</body>
</html>
